# tmux colors — auto-generated by wallust, do not edit manually

set -g mode-style "fg=#15191A,bg=#867F75"

set -g message-style "fg=#F0EEE9,bg=#383C3C"
set -g message-command-style "fg=#F0EEE9,bg=#383C3C"

set -g pane-border-style "fg=#383C3C"
set -g pane-active-border-style "fg=#9E9991"

set -g status-style "fg=#F0EEE9,bg=#15191A"

set -g status-left "#[fg=#15191A,bg=#867F75,bold] #S #[fg=#867F75,bg=#15191A,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#15191A,bg=#15191A,nobold,nounderscore,noitalics]#[fg=#F0EEE9,bg=#15191A] #{prefix_highlight} #[fg=#383C3C,bg=#15191A,nobold,nounderscore,noitalics]#[fg=#F0EEE9,bg=#383C3C] %Y-%m-%d  %I:%M %p #[fg=#867F75,bg=#383C3C,nobold,nounderscore,noitalics]#[fg=#15191A,bg=#867F75,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#15191A,bg=#15191A,nobold,nounderscore,noitalics]#[fg=#F0EEE9,bg=#15191A] #{prefix_highlight} #[fg=#383C3C,bg=#15191A,nobold,nounderscore,noitalics]#[fg=#F0EEE9,bg=#383C3C] %Y-%m-%d  %H:%M #[fg=#867F75,bg=#383C3C,nobold,nounderscore,noitalics]#[fg=#15191A,bg=#867F75,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#E2DED7,bg=#15191A"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#9E9B97,bg=#15191A"
setw -g window-status-format "#[fg=#15191A,bg=#15191A,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#15191A,bg=#15191A,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#15191A,bg=#867F75,nobold,nounderscore,noitalics]#[fg=#15191A,bg=#867F75,bold] #I  #W #F #[fg=#867F75,bg=#15191A,nobold,nounderscore,noitalics]"
