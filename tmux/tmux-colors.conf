# tmux colors — auto-generated by wallust, do not edit manually

set -g mode-style "fg=#1C1E24,bg=#9C8462"

set -g message-style "fg=#F6DDCC,bg=#3E4045"
set -g message-command-style "fg=#F6DDCC,bg=#3E4045"

set -g pane-border-style "fg=#3E4045"
set -g pane-active-border-style "fg=#B09D81"

set -g status-style "fg=#F6DDCC,bg=#1C1E24"

set -g status-left "#[fg=#1C1E24,bg=#9C8462,bold] #S #[fg=#9C8462,bg=#1C1E24,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#1C1E24,bg=#1C1E24,nobold,nounderscore,noitalics]#[fg=#F6DDCC,bg=#1C1E24] #{prefix_highlight} #[fg=#3E4045,bg=#1C1E24,nobold,nounderscore,noitalics]#[fg=#F6DDCC,bg=#3E4045] %Y-%m-%d  %I:%M %p #[fg=#9C8462,bg=#3E4045,nobold,nounderscore,noitalics]#[fg=#1C1E24,bg=#9C8462,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#1C1E24,bg=#1C1E24,nobold,nounderscore,noitalics]#[fg=#F6DDCC,bg=#1C1E24] #{prefix_highlight} #[fg=#3E4045,bg=#1C1E24,nobold,nounderscore,noitalics]#[fg=#F6DDCC,bg=#3E4045] %Y-%m-%d  %H:%M #[fg=#9C8462,bg=#3E4045,nobold,nounderscore,noitalics]#[fg=#1C1E24,bg=#9C8462,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#EAC6AE,bg=#1C1E24"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#A48A7A,bg=#1C1E24"
setw -g window-status-format "#[fg=#1C1E24,bg=#1C1E24,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#1C1E24,bg=#1C1E24,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1C1E24,bg=#9C8462,nobold,nounderscore,noitalics]#[fg=#1C1E24,bg=#9C8462,bold] #I  #W #F #[fg=#9C8462,bg=#1C1E24,nobold,nounderscore,noitalics]"
