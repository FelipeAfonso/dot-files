# tmux colors — auto-generated by wallust, do not edit manually

set -g mode-style "fg=#0F100F,bg=#858383"

set -g message-style "fg=#ECE9E7,bg=#333433"
set -g message-command-style "fg=#ECE9E7,bg=#333433"

set -g pane-border-style "fg=#333433"
set -g pane-active-border-style "fg=#9D9C9C"

set -g status-style "fg=#ECE9E7,bg=#0F100F"

set -g status-left "#[fg=#0F100F,bg=#858383,bold] #S #[fg=#858383,bg=#0F100F,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#0F100F,bg=#0F100F,nobold,nounderscore,noitalics]#[fg=#ECE9E7,bg=#0F100F] #{prefix_highlight} #[fg=#333433,bg=#0F100F,nobold,nounderscore,noitalics]#[fg=#ECE9E7,bg=#333433] %Y-%m-%d  %I:%M %p #[fg=#858383,bg=#333433,nobold,nounderscore,noitalics]#[fg=#0F100F,bg=#858383,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#0F100F,bg=#0F100F,nobold,nounderscore,noitalics]#[fg=#ECE9E7,bg=#0F100F] #{prefix_highlight} #[fg=#333433,bg=#0F100F,nobold,nounderscore,noitalics]#[fg=#ECE9E7,bg=#333433] %Y-%m-%d  %H:%M #[fg=#858383,bg=#333433,nobold,nounderscore,noitalics]#[fg=#0F100F,bg=#858383,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#DBD7D4,bg=#0F100F"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#9A9694,bg=#0F100F"
setw -g window-status-format "#[fg=#0F100F,bg=#0F100F,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#0F100F,bg=#0F100F,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#0F100F,bg=#858383,nobold,nounderscore,noitalics]#[fg=#0F100F,bg=#858383,bold] #I  #W #F #[fg=#858383,bg=#0F100F,nobold,nounderscore,noitalics]"
