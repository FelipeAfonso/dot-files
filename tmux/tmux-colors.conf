# tmux colors — auto-generated by wallust, do not edit manually

set -g mode-style "fg=#0D0F11,bg=#8B7C8C"

set -g message-style "fg=#ECEDED,bg=#313335"
set -g message-command-style "fg=#ECEDED,bg=#313335"

set -g pane-border-style "fg=#313335"
set -g pane-active-border-style "fg=#A296A3"

set -g status-style "fg=#ECEDED,bg=#0D0F11"

set -g status-left "#[fg=#0D0F11,bg=#8B7C8C,bold] #S #[fg=#8B7C8C,bg=#0D0F11,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#0D0F11,bg=#0D0F11,nobold,nounderscore,noitalics]#[fg=#ECEDED,bg=#0D0F11] #{prefix_highlight} #[fg=#313335,bg=#0D0F11,nobold,nounderscore,noitalics]#[fg=#ECEDED,bg=#313335] %Y-%m-%d  %I:%M %p #[fg=#8B7C8C,bg=#313335,nobold,nounderscore,noitalics]#[fg=#0D0F11,bg=#8B7C8C,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#0D0F11,bg=#0D0F11,nobold,nounderscore,noitalics]#[fg=#ECEDED,bg=#0D0F11] #{prefix_highlight} #[fg=#313335,bg=#0D0F11,nobold,nounderscore,noitalics]#[fg=#ECEDED,bg=#313335] %Y-%m-%d  %H:%M #[fg=#8B7C8C,bg=#313335,nobold,nounderscore,noitalics]#[fg=#0D0F11,bg=#8B7C8C,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#DCDDDD,bg=#0D0F11"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#9A9A9B,bg=#0D0F11"
setw -g window-status-format "#[fg=#0D0F11,bg=#0D0F11,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#0D0F11,bg=#0D0F11,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#0D0F11,bg=#8B7C8C,nobold,nounderscore,noitalics]#[fg=#0D0F11,bg=#8B7C8C,bold] #I  #W #F #[fg=#8B7C8C,bg=#0D0F11,nobold,nounderscore,noitalics]"
