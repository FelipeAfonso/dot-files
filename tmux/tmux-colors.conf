# tmux colors — auto-generated by wallust, do not edit manually

set -g mode-style "fg=#171619,bg=#788790"

set -g message-style "fg=#F0E9D4,bg=#3A393C"
set -g message-command-style "fg=#F0E9D4,bg=#3A393C"

set -g pane-border-style "fg=#3A393C"
set -g pane-active-border-style "fg=#939FA6"

set -g status-style "fg=#F0E9D4,bg=#171619"

set -g status-left "#[fg=#171619,bg=#788790,bold] #S #[fg=#788790,bg=#171619,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#171619,bg=#171619,nobold,nounderscore,noitalics]#[fg=#F0E9D4,bg=#171619] #{prefix_highlight} #[fg=#3A393C,bg=#171619,nobold,nounderscore,noitalics]#[fg=#F0E9D4,bg=#3A393C] %Y-%m-%d  %I:%M %p #[fg=#788790,bg=#3A393C,nobold,nounderscore,noitalics]#[fg=#171619,bg=#788790,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#171619,bg=#171619,nobold,nounderscore,noitalics]#[fg=#F0E9D4,bg=#171619] #{prefix_highlight} #[fg=#3A393C,bg=#171619,nobold,nounderscore,noitalics]#[fg=#F0E9D4,bg=#3A393C] %Y-%m-%d  %H:%M #[fg=#788790,bg=#3A393C,nobold,nounderscore,noitalics]#[fg=#171619,bg=#788790,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#E2D7BA,bg=#171619"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#9E9682,bg=#171619"
setw -g window-status-format "#[fg=#171619,bg=#171619,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#171619,bg=#171619,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#171619,bg=#788790,nobold,nounderscore,noitalics]#[fg=#171619,bg=#788790,bold] #I  #W #F #[fg=#788790,bg=#171619,nobold,nounderscore,noitalics]"
