# tmux colors — auto-generated by wallust, do not edit manually

set -g mode-style "fg=#141513,bg=#898168"

set -g message-style "fg=#E5E6D2,bg=#373836"
set -g message-command-style "fg=#E5E6D2,bg=#373836"

set -g pane-border-style "fg=#373836"
set -g pane-active-border-style "fg=#A19A86"

set -g status-style "fg=#E5E6D2,bg=#141513"

set -g status-left "#[fg=#141513,bg=#898168,bold] #S #[fg=#898168,bg=#141513,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#141513,bg=#141513,nobold,nounderscore,noitalics]#[fg=#E5E6D2,bg=#141513] #{prefix_highlight} #[fg=#373836,bg=#141513,nobold,nounderscore,noitalics]#[fg=#E5E6D2,bg=#373836] %Y-%m-%d  %I:%M %p #[fg=#898168,bg=#373836,nobold,nounderscore,noitalics]#[fg=#141513,bg=#898168,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#141513,bg=#141513,nobold,nounderscore,noitalics]#[fg=#E5E6D2,bg=#141513] #{prefix_highlight} #[fg=#373836,bg=#141513,nobold,nounderscore,noitalics]#[fg=#E5E6D2,bg=#373836] %Y-%m-%d  %H:%M #[fg=#898168,bg=#373836,nobold,nounderscore,noitalics]#[fg=#141513,bg=#898168,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#D1D3B7,bg=#141513"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#929480,bg=#141513"
setw -g window-status-format "#[fg=#141513,bg=#141513,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#141513,bg=#141513,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#141513,bg=#898168,nobold,nounderscore,noitalics]#[fg=#141513,bg=#898168,bold] #I  #W #F #[fg=#898168,bg=#141513,nobold,nounderscore,noitalics]"
