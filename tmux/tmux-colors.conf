# tmux colors — auto-generated by wallust, do not edit manually

set -g mode-style "fg=#1D1F24,bg=#83A0B0"

set -g message-style "fg=#F3F5F6,bg=#3F4145"
set -g message-command-style "fg=#F3F5F6,bg=#3F4145"

set -g pane-border-style "fg=#3F4145"
set -g pane-active-border-style "fg=#9CB3C0"

set -g status-style "fg=#F3F5F6,bg=#1D1F24"

set -g status-left "#[fg=#1D1F24,bg=#83A0B0,bold] #S #[fg=#83A0B0,bg=#1D1F24,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#1D1F24,bg=#1D1F24,nobold,nounderscore,noitalics]#[fg=#F3F5F6,bg=#1D1F24] #{prefix_highlight} #[fg=#3F4145,bg=#1D1F24,nobold,nounderscore,noitalics]#[fg=#F3F5F6,bg=#3F4145] %Y-%m-%d  %I:%M %p #[fg=#83A0B0,bg=#3F4145,nobold,nounderscore,noitalics]#[fg=#1D1F24,bg=#83A0B0,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#1D1F24,bg=#1D1F24,nobold,nounderscore,noitalics]#[fg=#F3F5F6,bg=#1D1F24] #{prefix_highlight} #[fg=#3F4145,bg=#1D1F24,nobold,nounderscore,noitalics]#[fg=#F3F5F6,bg=#3F4145] %Y-%m-%d  %H:%M #[fg=#83A0B0,bg=#3F4145,nobold,nounderscore,noitalics]#[fg=#1D1F24,bg=#83A0B0,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#E5E8EA,bg=#1D1F24"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#A0A2A4,bg=#1D1F24"
setw -g window-status-format "#[fg=#1D1F24,bg=#1D1F24,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#1D1F24,bg=#1D1F24,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1D1F24,bg=#83A0B0,nobold,nounderscore,noitalics]#[fg=#1D1F24,bg=#83A0B0,bold] #I  #W #F #[fg=#83A0B0,bg=#1D1F24,nobold,nounderscore,noitalics]"
